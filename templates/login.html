<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a2e; }
        label { display: block; font-size: 0.875rem; color: #555; margin-bottom: 0.25rem; }
        input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #4f46e5; }
        button {
            width: 100%;
            padding: 0.7rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #4338ca; }
        .error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 5px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #777; }
        .link a { color: #4f46e5; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Anmelden</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" required autocomplete="username">

            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">

            <button type="submit">Einloggen</button>
        </form>

        <p class="link">Noch kein Konto? <a href="/register">Registrieren</a></p>
    </div>
</body>
</html>
