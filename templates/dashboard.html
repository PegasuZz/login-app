<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .avatar {
            width: 64px;
            height: 64px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            color: white;
            margin: 0 auto 1.25rem;
        }
        h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 0.5rem; }
        p { color: #777; font-size: 0.95rem; margin-bottom: 1.75rem; }
        a.logout {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: #ef4444;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        a.logout:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">{{ username[0].upper() }}</div>
        <h1>Willkommen, {{ username }}!</h1>
        <p>Du bist erfolgreich eingeloggt.</p>
        <a href="/logout" class="logout">Ausloggen</a>
    </div>
</body>
</html>
